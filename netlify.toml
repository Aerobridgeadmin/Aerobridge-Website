[build]
  publish = "."

# Clean URLs for all pages
[[redirects]]
  from = "/sobrenosotros"
  to = "/sobrenosotros.html"
  status = 200

[[redirects]]
  from = "/servicios"
  to = "/servicios.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/faq"
  to = "/faq.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/contacto.html"
  status = 200

[[redirects]]
  from = "/listadepreciosyservicios"
  to = "/listadepreciosyservicios.html"
  status = 200

[[redirects]]
  from = "/como-empezar"
  to = "/como-empezar.html"
  status = 200

[[redirects]]
  from = "/preparacion-examenes"
  to = "/preparacion-examenes.html"
  status = 200

[[redirects]]
  from = "/consulta-gratis"
  to = "/consulta-gratis.html"
  status = 200

# Form success page
[[redirects]]
  from = "/success"
  to = "/contact.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
